<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审批流程配置 - Sandvik Sales Forecast Tool</title>
  <script src="./lib/vue.global.prod.js"></script>
  <script src="./lib/antd-vue.min.js"></script>
  <style>
    :root { --sandvik-blue: #0D3D92; --bg-color: #F5F7FA; --border-color: #E5E7EB; --text-primary: #1F2937; --text-secondary: #6B7280; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-color); }
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .page-header { background: var(--sandvik-blue); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; flex-shrink: 0; }
    .page-header h1 { font-size: 16px; font-weight: 600; }

    /* Layout */
    .bd-layout { display: flex; flex: 1; overflow: hidden; min-height: calc(100vh - 56px); }
    .bd-sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
    .bd-sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; background: #fafafa; }
    .bd-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .bd-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .bd-toolbar { padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--border-color); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .bd-toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .bd-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

    /* Two-level nav */
    .nav-group { margin-bottom: 4px; }
    .nav-group-title { padding: 8px 16px 4px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .nav-group-title:hover { color: var(--sandvik-blue); }
    .nav-group-arrow { font-size: 10px; transition: transform 0.2s; }
    .nav-group-arrow.open { transform: rotate(90deg); }
    .nav-sub-items { overflow: hidden; }
    .nav-sub-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px 8px 24px; font-size: 13px; cursor: pointer; color: var(--text-primary); border-left: 3px solid transparent; transition: all 0.15s; }
    .nav-sub-item:hover { background: #f0f4ff; border-left-color: #c0d0f0; }
    .nav-sub-item.active { background: #e8f0fe; color: var(--sandvik-blue); border-left-color: var(--sandvik-blue); font-weight: 600; }

    /* Content styles */
    .page-body { background: var(--bg-color); min-height: calc(100vh - 56px); padding: 20px 24px; }
    .placeholder-card { background: #fff; border-radius: 10px; border: 1px solid var(--border-color); padding: 60px 40px; text-align: center; }
    .placeholder-icon { font-size: 64px; margin-bottom: 20px; }
    .placeholder-title { font-size: 20px; font-weight: 700; color: var(--sandvik-blue); margin-bottom: 12px; }
    .placeholder-desc { font-size: 14px; color: #6B7280; margin-bottom: 24px; line-height: 1.8; }
    .feature-chip { background: #e8f0fe; color: var(--sandvik-blue); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display:inline-block;margin:4px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border-color); background: #fff; color: var(--text-primary); transition: all 0.15s; }
    .btn:hover { border-color: var(--sandvik-blue); color: var(--sandvik-blue); }
    .btn-primary { background: var(--sandvik-blue); color: #fff; border-color: var(--sandvik-blue); }
    .btn-primary:hover { background: #0a3280; }
    .flow-diagram { display: flex; gap: 8px; align-items: center; justify-content: center; margin: 28px 0; flex-wrap: wrap; }
    .flow-step { background: #e8f0fe; border: 2px solid var(--sandvik-blue); border-radius: 8px; padding: 12px 20px; text-align: center; min-width: 100px; }
    .flow-step-num { background: var(--sandvik-blue); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .flow-step-name { font-size: 12px; font-weight: 600; color: var(--sandvik-blue); }
    .flow-arrow { font-size: 20px; color: var(--sandvik-blue); }
  </style>
</head>
<body>
<div id="app">
  <div class="page-header"><h1>⚡ 审批流程配置</h1></div>

  <div class="bd-layout">

    <!-- Left Sidebar -->
    <div class="bd-sidebar">
      <div class="bd-sidebar-header">📂 功能导航</div>
      <div class="bd-nav">
        <div v-for="group in navGroups" :key="group.name" class="nav-group">
          <div class="nav-group-title" @click="toggleGroup(group.name)">
            <span>{{ group.name }}</span>
            <span class="nav-group-arrow" :class="{ open: openGroups.includes(group.name) }">▶</span>
          </div>
          <div class="nav-sub-items" v-show="openGroups.includes(group.name)">
            <div v-for="item in group.items" :key="item.id"
                 class="nav-sub-item"
                 :class="{ active: currentGroup === group.name && currentModule === item.id }"
                 @click="navigateTo(group.name, item.id)">
              <span>{{ item.icon }} {{ item.name }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Content -->
    <div class="bd-content">
      <div class="page-body">
        <div class="placeholder-card">
          <div class="placeholder-icon">⚡</div>
          <div class="placeholder-title">审批流程配置</div>
          <div class="placeholder-desc">
            配置销售预测的审批流程规则，支持多级审批、审批人代理、条件分支等。
          </div>
          <div class="feature-chip">🔀 多级审批</div>
          <div class="feature-chip">👤 审批人代理</div>
          <div class="feature-chip">🔁 条件分支</div>
          <div class="feature-chip">📝 审批历史</div>

          <div class="flow-diagram">
            <div class="flow-step"><div class="flow-step-num">1</div><div class="flow-step-name">销售填报</div></div>
            <div class="flow-arrow">→</div>
            <div class="flow-step"><div class="flow-step-num">2</div><div class="flow-step-name">区总审批</div></div>
            <div class="flow-arrow">→</div>
            <div class="flow-step"><div class="flow-step-num">3</div><div class="flow-step-name">财务审批</div></div>
            <div class="flow-arrow">→</div>
            <div class="flow-step"><div class="flow-step-num">✓</div><div class="flow-step-name">完成</div></div>
          </div>

          <div style="margin-top:24px;"><button class="btn btn-primary" onclick="alert('审批流程配置功能开发中')">⚙️ 功能开发中</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref } = Vue;

const app = createApp({
  setup() {
    const navGroups = [
      {
        name: '销售预测管理',
        items: [
          { id: 'dashboard', name: 'Dashboard', icon: '📊', href: 'antd-dashboard.html' },
          { id: 'forecast', name: '销售预测填报', icon: '📝', href: 'antd-forecast.html' },
          { id: 'forecast-monthly', name: '销售预测填报（按月）', icon: '📅', href: 'antd-monthly-report.html' },
          { id: 'approval', name: '销售预测审核', icon: '✅', href: 'antd-approval.html' },
          { id: 'report', name: '分析报表', icon: '📈', href: 'antd-analysis-report.html' },
        ]
      },
      {
        name: '基础数据管理',
        items: [
          { id: 'org', name: '组织架构', icon: '👥', href: 'antd-basedata.html', tab: 'org' },
          { id: 'customer', name: '客户信息', icon: '🏢', href: 'antd-basedata.html', tab: 'customer' },
          { id: 'invoiceCompany', name: '开票公司', icon: '🏛️', href: 'antd-basedata.html', tab: 'invoiceCompany' },
          { id: 'productHierarchy', name: '产品分类', icon: '📦', href: 'antd-basedata.html', tab: 'productHierarchy' },
          { id: 'productLibrary', name: '产品库', icon: '🗃️', href: 'antd-basedata.html', tab: 'productLibrary' },
          { id: 'productPricing', name: '产品价格', icon: '💰', href: 'antd-basedata.html', tab: 'productPricing' },
          { id: 'regionMapping', name: '区域映射', icon: '🗺️', href: 'antd-basedata.html', tab: 'regionMapping' },
          { id: 'dataDict', name: '数据字典', icon: '📋', href: 'antd-basedata.html', tab: 'dataDict' },
        ]
      },
      {
        name: '系统管理',
        items: [
          { id: 'users', name: '用户账号管理', icon: '👤', href: 'antd-users.html' },
          { id: 'permissions', name: '角色和权限管理', icon: '🔐', href: 'antd-permissions.html' },
          { id: 'fc-version', name: '预测周期管理', icon: '📅', href: 'antd-fc-version.html' },
          { id: 'login-log', name: '系统登录日志', icon: '📋', href: 'antd-login-log.html' },
          { id: 'system-log', name: '系统操作日志', icon: '🗒️', href: 'antd-system-log.html' },
          { id: 'approval-flow', name: '审批流程配置', icon: '⚙️', href: 'antd-approval-flow.html' },
        ]
      }
    ];
    const openGroups = ref(['销售预测管理', '基础数据管理', '系统管理']);
    const currentGroup = ref('系统管理');
    const currentModule = ref('approval-flow');

    const toggleGroup = (name) => {
      const idx = openGroups.value.indexOf(name);
      if (idx >= 0) openGroups.value.splice(idx, 1);
      else openGroups.value.push(name);
    };
    const navigateTo = (groupName, itemId) => {
      currentGroup.value = groupName;
      currentModule.value = itemId;
      const group = navGroups.find(g => g.name === groupName);
      const item = group.items.find(i => i.id === itemId);
      if (item.href) { location.href = item.href + (item.tab ? '?tab=' + item.tab : ''); }
    };

    return {
      navGroups, openGroups, currentGroup, currentModule,
      toggleGroup, navigateTo
    };
  }
});

app.mount('#app');
</script>
</body>
</html>
