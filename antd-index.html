<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandvik Machining 销售预测系统</title>
  <!-- Local Resources -->
  <link rel="stylesheet" href="./lib/reset.css">
  <script src="./lib/vue.global.prod.js"></script>
  <script src="./lib/dayjs.min.js"></script>
  <script src="./lib/dayjs-plugin-advancedFormat.js"></script>
  <script src="./lib/dayjs-plugin-customParseFormat.js"></script>
  <script src="./lib/dayjs-plugin-localeData.js"></script>
  <script src="./lib/zh-cn.min.js"></script>
  <script src="./lib/dayjs-plugin-quarterOfYear.js"></script>
  <script src="./lib/dayjs-plugin-weekOfYear.js"></script>
  <script src="./lib/dayjs-plugin-weekYear.js"></script>
  <script src="./lib/dayjs-plugin-weekday.js"></script>
  <script src="./lib/antd-vue.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const { createApp } = Vue;
    const app = createApp({
      setup() {
        const { message } = antd;
        return { message };
      },
      template: "<a-button @click=\"message.info('Ant Design Vue loaded successfully!')\">Test Button</a-button>"
    });
    app.use(antd).mount("#app");
  </script>
  <script src="app.js"></script>
</body>
</html>
