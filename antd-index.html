<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandvik Machining 销售预测系统</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue/dist/reset.css">
  <script src="https://unpkg.com/ant-design-vue/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/charts@2.2.8/dist/charts.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const { createApp } = Vue;
    const app = createApp({
      setup() {
        const { message } = antd;
        return { message };
      },
      template: "<a-button @click=\"message.info('Ant Design Vue loaded successfully!')\">Test Button</a-button>"
    });
    app.use(antd).mount("#app");
  </script>
  <script src="app.js"></script>
</body>
</html>
