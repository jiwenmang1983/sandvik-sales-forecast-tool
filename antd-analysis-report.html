<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析报表 - Sandvik Sales Forecast Tool</title>
  <script src="./lib/vue.global.prod.js"></script>
  <script src="./lib/antd-vue.min.js"></script>
  <style>
    :root { --sandvik-blue: #0D3D92; --bg-color: #F5F7FA; --border-color: #E5E7EB; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-color); min-height: 100vh; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    .page-header { background: var(--sandvik-blue); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    .page-header h1 { font-size: 16px; font-weight: 600; }
    .page-body { flex: 1; padding: 20px 24px; }
    .placeholder-card { background: #fff; border-radius: 10px; border: 1px solid var(--border-color); padding: 60px 40px; text-align: center; }
    .placeholder-icon { font-size: 64px; margin-bottom: 20px; }
    .placeholder-title { font-size: 20px; font-weight: 700; color: var(--sandvik-blue); margin-bottom: 12px; }
    .placeholder-desc { font-size: 14px; color: #6B7280; margin-bottom: 24px; line-height: 1.8; }
    .feature-chip { background: #e8f0fe; color: var(--sandvik-blue); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display:inline-block;margin:4px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border-color); background: #fff; color: #1F2937; }
    .btn-primary { background: var(--sandvik-blue); color: #fff; border-color: var(--sandvik-blue); }
    .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 28px; }
    .report-card { border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; text-align: left; cursor: pointer; transition: all 0.15s; }
    .report-card:hover { border-color: var(--sandvik-blue); box-shadow: 0 4px 12px rgba(13,61,146,0.1); }
    .report-icon { font-size: 28px; margin-bottom: 10px; }
    .report-name { font-size: 14px; font-weight: 600; color: #1F2937; margin-bottom: 4px; }
    .report-desc { font-size: 12px; color: #6B7280; }
  </style>
</head>
<body>
<div id="app">
  <div class="page-header"><h1>📊 分析报表</h1></div>
  <div class="page-body">
    <div class="placeholder-card">
      <div class="placeholder-icon">📊</div>
      <div class="placeholder-title">分析报表中心</div>
      <div class="placeholder-desc">多维度分析销售预测数据，支持钻取、对比、趋势分析</div>
      <span class="feature-chip">🔍 数据钻取</span>
      <span class="feature-chip">📈 趋势对比</span>
      <span class="feature-chip">🗓️ 周期对比</span>
      <span class="feature-chip">🏢 区域分析</span>
      <div class="report-grid">
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">📈</div><div class="report-name">销售趋势分析</div><div class="report-desc">按月/季度/年度分析销售趋势</div>
        </div>
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">🏢</div><div class="report-name">客户分析</div><div class="report-desc">客户贡献度与增长分析</div>
        </div>
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">📦</div><div class="report-name">产品分析</div><div class="report-desc">PA 产品线销售结构分析</div>
        </div>
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">🗺️</div><div class="report-name">区域分析</div><div class="report-desc">各销售大区业绩对比</div>
        </div>
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">✅</div><div class="report-name">预测准确率</div><div class="report-desc">实际 vs 预测偏差分析</div>
        </div>
        <div class="report-card" onclick="alert('开发中')">
          <div class="report-icon">👥</div><div class="report-name">人员绩效</div><div class="report-desc">销售人员业绩排行榜</div>
        </div>
      </div>
      <div style="margin-top:28px;"><button class="btn btn-primary" onclick="alert('分析报表功能开发中')">⚙️ 功能开发中</button></div>
    </div>
  </div>
</div>
<script>const { createApp } = Vue; const app = createApp({}); app.use(antd); app.mount('#app');</script>
</body>
</html>
