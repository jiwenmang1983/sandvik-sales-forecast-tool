<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>China Division Sales Forecast Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ant-design-vue@4.x/dist/reset.css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 100%;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #F5A623;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #0D3D92;
      font-size: 16px;
      flex-shrink: 0;
    }

    .trigger {
      font-size: 18px;
      cursor: pointer;
      padding: 0 12px;
      line-height: 64px;
      color: rgba(255, 255, 255, 0.65);
      transition: color 0.3s;
    }

    .trigger:hover {
      color: #ffffff;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .notification-btn {
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      font-size: 18px;
      padding: 0 12px;
      height: 64px;
      display: flex;
      align-items: center;
      transition: color 0.3s;
    }

    .notification-btn:hover {
      color: #ffffff;
    }

    .user-dropdown {
      cursor: pointer;
      padding: 0 16px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.65);
      transition: color 0.3s;
    }

    .user-dropdown:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
    }

    .sider-logo {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D3D92;
      border-bottom: 1px solid #E5E7EB;
    }

    .sider-logo-icon {
      width: 32px;
      height: 32px;
      background: #F5A623;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #0D3D92;
      font-size: 16px;
    }

    .page-header {
      background: #ffffff;
      padding: 16px 24px;
      border-bottom: 1px solid #E5E7EB;
      margin-bottom: 0;
    }

    .page-title {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #1F2937;
    }

    .page-content {
      background: #F5F7FA;
      min-height: calc(100vh - 64px);
      padding: 24px;
    }

    .welcome-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      border: 1px solid #E5E7EB;
    }

    .welcome-title {
      margin: 0 0 8px 0;
      font-size: 24px;
      color: #1F2937;
    }

    .welcome-subtitle {
      margin: 0 0 24px 0;
      color: #6B7280;
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: #F5F7FA;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
    }

    .stat-label {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: #0D3D92;
    }

    .stat-trend {
      font-size: 12px;
      margin-top: 4px;
    }

    .trend-up {
      color: #52C41A;
    }

    .trend-down {
      color: #FF4D4F;
    }
  </style>
</head>
<body>
  <div id="app">
    <a-layout style="min-height: 100vh;">
      <!-- Sider -->
      <a-layout-sider
        v-model:collapsed="collapsed"
        :trigger="null"
        collapsible
        :width="220"
        :collapsed-width="80"
        style="background: #ffffff; box-shadow: 2px 0 8px rgba(0,0,0,0.05);"
      >
        <div class="sider-logo">
          <div class="sider-logo-icon">S</div>
        </div>
        <a-menu
          v-model:selectedKeys="selectedKeys"
          mode="inline"
          :inline-collapsible="true"
          style="border-right: none; margin-top: 8px;"
        >
          <a-menu-item key="dashboard">
            <template #icon><dashboard-outlined /></template>
            <span>Dashboard</span>
          </a-menu-item>
          <a-menu-item key="forecast">
            <template #icon><form-outlined /></template>
            <span>销售预测填报</span>
          </a-menu-item>
          <a-menu-item key="approval">
            <template #icon><check-circle-outlined /></template>
            <span>销售预测审核</span>
          </a-menu-item>
          <a-menu-item key="fc-version">
            <template #icon><calendar-outlined /></template>
            <span>预测周期管理</span>
          </a-menu-item>
          <a-menu-item key="base-data">
            <template #icon><setting-outlined /></template>
            <span>基础数据管理</span>
          </a-menu-item>
        </a-menu>
      </a-layout-sider>

      <a-layout>
        <!-- Header -->
        <a-layout-header style="background: #0D3D92; padding: 0 16px; height: 64px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(13,61,146,0.15);">
          <menu-fold-outlined
            class="trigger"
            @click="() => collapsed = !collapsed"
          />
          <div class="logo">
            <div class="logo-icon">S</div>
            <span class="logo-text">China Division Sales Forecast Tool</span>
          </div>
          <div class="header-actions">
            <a-badge :count="3" :offset="[-2, 2]">
              <bell-outlined class="notification-btn" />
            </a-badge>
            <a-dropdown>
              <div class="user-dropdown">
                <user-outlined />
                <span>Admin User</span>
              </div>
              <template #overlay>
                <a-menu>
                  <a-menu-item key="profile">
                    <user-outlined style="margin-right: 8px;" />Profile
                  </a-menu-item>
                  <a-menu-item key="settings">
                    <setting-outlined style="margin-right: 8px;" />Settings
                  </a-menu-item>
                  <a-menu-divider />
                  <a-menu-item key="logout">
                    <logout-outlined style="margin-right: 8px;" />Logout
                  </a-menu-item>
                </a-menu>
              </template>
            </a-dropdown>
          </div>
        </a-layout-header>

        <!-- Content -->
        <a-layout-content style="background: #F5F7FA; min-height: calc(100vh - 64px);">
          <div style="background: #ffffff; border-bottom: 1px solid #E5E7EB; padding: 16px 24px;">
            <h2 style="margin: 0; font-size: 20px; color: #1F2937;">Dashboard</h2>
          </div>
          <div style="padding: 24px;">
            <div class="welcome-card">
              <h1 class="welcome-title">欢迎使用销售预测工具</h1>
              <p class="welcome-subtitle">Welcome to China Division Sales Forecast Tool</p>
              <div class="stats-grid">
                <div class="stat-card">
                  <div class="stat-label">当前周期</div>
                  <div class="stat-value">Q2 2026</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">待审核</div>
                  <div class="stat-value">12</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">已完成</div>
                  <div class="stat-value">48</div>
                  <div class="stat-trend trend-up">+5 本周期</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">预测准确率</div>
                  <div class="stat-value">94%</div>
                </div>
              </div>
            </div>
          </div>
        </a-layout-content>
      </a-layout>
    </a-layout>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.x/dist/antd.min.js"></script>
  <script>
    const { createApp, ref } = Vue;
    const {
      DashboardOutlined,
      FormOutlined,
      CheckCircleOutlined,
      CalendarOutlined,
      SettingOutlined,
      MenuFoldOutlined,
      MenuUnfoldOutlined,
      BellOutlined,
      UserOutlined,
      LogoutOutlined
    } = antd.icons;

    const app = createApp({
      setup() {
        const collapsed = ref(false);
        const selectedKeys = ref(['dashboard']);
        return {
          collapsed,
          selectedKeys
        };
      }
    });

    app.use(antd).mount('#app');
  </script>
</body>
</html>
