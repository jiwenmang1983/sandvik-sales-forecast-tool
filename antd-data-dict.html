<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据字典 - Sandvik Sales Forecast Tool</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.0.0/dist/antd.min.js"></script>
  <style>
    :root { --sandvik-blue: #0D3D92; --bg-color: #F5F7FA; --border-color: #E5E7EB; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-color); min-height: 100vh; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    .page-header { background: var(--sandvik-blue); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    .page-header h1 { font-size: 16px; font-weight: 600; }
    .page-body { flex: 1; padding: 20px 24px; }
    .placeholder-card { background: #fff; border-radius: 10px; border: 1px solid var(--border-color); padding: 60px 40px; text-align: center; }
    .placeholder-icon { font-size: 64px; margin-bottom: 20px; }
    .placeholder-title { font-size: 20px; font-weight: 700; color: var(--sandvik-blue); margin-bottom: 12px; }
    .placeholder-desc { font-size: 14px; color: #6B7280; margin-bottom: 24px; line-height: 1.8; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border-color); background: #fff; color: #1F2937; }
    .btn-primary { background: var(--sandvik-blue); color: #fff; border-color: var(--sandvik-blue); }
  </style>
</head>
<body>
<div id="app">
  <div class="page-header"><h1">📖 数据字典</h1></div>
  <div class="page-body">
    <div class="placeholder-card">
      <div class="placeholder-icon">📖</div>
      <div class="placeholder-title">数据字典</div>
      <div class="placeholder-desc">
        统一管理系统中的编码规则、枚举值、字段说明、上下架配置等元数据。
      </div>
      <div style="margin-top:28px;"><button class="btn btn-primary" onclick="alert('数据字典功能开发中')">⚙️ 功能开发中</button></div>
    </div>
  </div>
</div>
<script>
    dayjs.extend(dayjs_plugin_advancedFormat);
    dayjs.extend(dayjs_plugin_customParseFormat);
    dayjs.extend(dayjs_plugin_localeData);
    dayjs.extend(dayjs_plugin_quarterOfYear);
    dayjs.extend(dayjs_plugin_weekOfYear);
    dayjs.extend(dayjs_plugin_weekYear);
    dayjs.extend(dayjs_plugin_weekday);
    const { createApp } = Vue; const app = createApp({}); app.use(antd); app.mount('#app');
</script>
</body>
</html>
